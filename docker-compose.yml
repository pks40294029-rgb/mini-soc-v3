services:
  nginx:
    image: nginx:latest
    container_name: nginx01
    hostname: nginx01
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    networks:
      - Web.net
      - DNS.net
    depends_on:
      - web

  web:
    build: ./web
    container_name: web01
    hostname: web01
      #ports:
      #- "80:80"
    networks:
      - Web.net
      - DB.net
      - DNS.net
    extra_hosts:
      - "wazuh-manager01:172.20.0.2"       
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: db01
    hostname: db01
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: webuser
      MYSQL_PASSWORD: webpass
    networks:
      - DB.net
    volumes:
      - db_data:/var/lib/mysql

  dns:
    image: ubuntu/bind9:latest
    container_name: dns01
    hostname: dns01
    networks:
      - DNS.net
      - Admin.net
    extra_hosts:
      - "wazuh-manager01:172.21.0.2"
        
  admin:
    image: ubuntu:22.04
    container_name: admin01
    hostname: admin01
    ports:
      - "20022:22"
    command: sleep infinity
    networks:
      - Admin.net
      - DNS.net
      - Web.net
      - DB.net

